<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasbih</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0f2015; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        h1 { color: #d4af37; margin-bottom: 5px; }
        .num { font-size: 70px; font-weight: bold; margin: 30px 0; color: #fff; }
        .btn { width: 200px; height: 200px; border-radius: 50%; background: #163020; border: 5px solid #d4af37; color: #fff; font-size: 24px; font-weight: bold; cursor: pointer; }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <h1>Tasbih de Istighfar</h1>
    <div style="font-size:24px;">أَسْتَغْفِرُ اللَّهَ</div>
    
    <div class="num" id="contador">0</div>
    
    <button class="btn" onclick="contar()">PULSAR</button>

    <script>
        window.Telegram.WebApp.expand();
        let cuenta = 0;
        function contar() {
            cuenta++;
            document.getElementById('contador').innerText = cuenta;
        }
    </script>
</body>
</html>
